[package]
name = "axplat-arm-qemu-virt"
version = "0.3.0"
edition = "2024"

[features]
irq = ["axplat/irq", "axplat-arm-peripherals/irq"]
smp = ["axplat/smp"]
rtc = []
fp-simd = ["axcpu/fp-simd"]
default = []

[dependencies]
axconfig-macros = "0.2"
axcpu = { workspace = true }
page_table_entry = "0.6"
axplat = { workspace = true }
axplat-arm-peripherals = { workspace = true }
