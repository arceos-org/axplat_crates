[package]
name = "axplat-arm-qemu-virt"
version = "0.4.2"
description = "Implementation of `axplat` hardware abstraction layer for QEMU ARM virtual machine."
documentation = "https://docs.rs/axplat-arm-qemu-virt"
keywords = ["arceos", "os", "hal", "embedded", "armv7"]
categories = ["embedded", "no-std", "hardware-support", "os"]
edition.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[features]
irq = ["axplat/irq", "axplat-arm-peripherals/irq"]
smp = ["axplat/smp"]
rtc = []
fp-simd = ["axcpu/fp-simd"]
default = []

[dependencies]
axconfig-macros = "0.2"
axcpu = { workspace = true }
page_table_entry = "0.6"
axplat = { workspace = true }
axplat-arm-peripherals = { workspace = true }

[package.metadata.docs.rs]
targets = ["armv7a-none-eabi"]
