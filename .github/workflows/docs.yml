name: Docs

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: --cfg docsrs -Zunstable-options --enable-index-page -D rustdoc::broken_intra_doc_links -D missing-docs
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: aarch64-unknown-none

      - name: Build docs
        run: cargo doc --all-features --no-deps --target aarch64-unknown-none -p axplat -p axplat-macros -p axplat-arm-peripherals

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: target/aarch64-unknown-none/doc

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
